version: '3.8'

services:
  mongo:
    image: mongo:latest
    command: mongod --replSet rs0 --bind_ip_all
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.sh:/docker-entrypoint-initdb.d/mongo-init.sh
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'rs.status()']
      interval: 15s
      timeout: 10s
      retries: 3

  mongo-init:
    image: mongo:latest
    depends_on:
      mongo:
        condition: service_healthy
    command: >
      mongosh --host mongo:27017 --eval '
        rs.initiate({
          _id: "rs0",
          members: [
            { _id: 0, host: "mongo:27017" }
          ]
        })
      '

volumes:
  mongo_data:
